name = "stroodlenoodle-api"
main = "worker/index.ts"
compatibility_date = "2025-02-04"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

[vars]
FRONTEND_ORIGIN = "http://localhost:5173"

